apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: cloud-monitor
  labels:
    app: dashboard
    component: web-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
        component: web-ui
    spec:
      containers:
        - name: dashboard
          image: cloud-monitor-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: cloud-monitor-config
            - secretRef:
                name: cloud-monitor-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: cloud-monitor
spec:
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP