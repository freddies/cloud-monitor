apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-monitor-config
  namespace: cloud-monitor
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  COLLECTION_INTERVAL_SECONDS: "10"
  ANOMALY_THRESHOLD: "0.85"
  MODEL_RETRAIN_INTERVAL_HOURS: "24"
  DETECTION_WINDOW_SECONDS: "300"
  ALERT_COOLDOWN_MINUTES: "15"
  DASHBOARD_HOST: "0.0.0.0"
  DASHBOARD_PORT: "5000"
  METRICS_RETENTION_HOURS: "72"
---
apiVersion: v1
kind: Secret
metadata:
  name: cloud-monitor-secrets
  namespace: cloud-monitor
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_SNS_TOPIC_ARN: ""
  SLACK_WEBHOOK_URL: ""
  REDIS_PASSWORD: ""
  SECRET_KEY: "change-this-in-production-k8s"